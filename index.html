<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="referrer" content="no-referrer">
<meta name="apple-mobile-web-app-title" content="基金看板">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Jany基金看板</title>
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0e14;--bg2:#111720;--bg3:#1a2130;--bg4:#1f2a3d;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --t1:#e8edf5;--t2:#9aaabb;--t3:#6b7f96;
  --accent:#3b82f6;
  --up:#f04444;--up-bg:rgba(240,68,68,0.12);--up-bd:rgba(240,68,68,0.3);
  --dn:#22c55e;--dn-bd:rgba(34,197,94,0.3);
  --flat:#e8edf5;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}
html,body{max-width:100%;overflow-x:hidden;position:relative}
body{background:var(--bg);color:var(--t1);font-family:'Noto Sans SC','PingFang SC',-apple-system,sans-serif;font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased}
.up{color:var(--up)}.down{color:var(--dn)}.flat{color:var(--flat)}

/* ── Header ── */
.header{position:sticky;top:0;z-index:200;padding:calc(var(--sat) + 12px) 16px 12px;background:rgba(10,14,20,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;width:100%}
.hd-left{display:flex;align-items:center;gap:10px;min-width:0}
.hd-title{font-size:16px;font-weight:600}
.hd-sub{font-size:11px;color:var(--t2);margin-top:2px;display:flex;align-items:center;gap:5px}
.mkt-dot{width:6px;height:6px;border-radius:50%;background:var(--flat);flex-shrink:0}
.mkt-dot.open{background:var(--dn);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}
.hd-right{text-align:right;flex-shrink:0;margin-left:12px}
.hd-time{font-family:'Outfit',sans-serif;font-size:20px;font-weight:600;line-height:1}
.hd-date{font-size:10px;color:var(--t3);margin-top:3px}

/* ── 指数栏 ── */
.idx-bar{width:100%;background:var(--bg2);border-bottom:1px solid var(--bd);display:grid;grid-template-columns:repeat(3,1fr)}
.idx-cell{padding:10px 8px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);overflow:hidden;position:relative}
.idx-cell::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;opacity:0}
.idx-cell.up::after{background:var(--up);opacity:1}
.idx-cell.down::after{background:var(--dn);opacity:1}
.idx-cell.flat::after{background:var(--flat);opacity:1}
.idx-cell:nth-child(3n){border-right:none}
.idx-cell:nth-child(n+4){border-bottom:none}
.idx-lbl{font-size:10px;color:var(--t2);font-weight:500;margin-bottom:5px;white-space:nowrap}
.idx-row{display:flex;align-items:baseline;gap:6px}
.idx-chg{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;line-height:1}
.idx-price{font-family:'Outfit',sans-serif;font-size:11px;font-weight:400;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── 卡片列标题栏 ── */
.card-header-bar{display:none;align-items:center;padding:6px 12px 6px 16px;background:var(--bg2);border-bottom:1px solid var(--bd);gap:8px;position:sticky;top:calc(var(--sat) + 56px);z-index:100}
.chb-title{font-size:11px;color:var(--t3);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chb-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.chb-btn{padding:4px 10px;border-radius:8px;border:1px solid var(--bd2);background:transparent;color:var(--t2);font-size:11px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;white-space:nowrap}
.chb-btn:active{background:var(--bg3)}

/* ── 底部工具栏 ── */
.toolbar{background:var(--bg2);border-top:1px solid var(--bd);padding:10px 12px;display:flex;align-items:center;gap:8px;overflow:hidden}
body.collapsed-mode .toolbar{position:fixed;bottom:0;left:0;right:0;padding:10px 12px calc(var(--sab) + 10px);z-index:150;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
body.collapsed-mode main{padding-bottom:calc(var(--sab) + 68px)}
.search-wrap{flex:1;min-width:0;display:flex;align-items:center;background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:0 12px;gap:8px}
.search-wrap input{flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--t1);font-family:'Outfit',sans-serif;font-size:14px;padding:9px 0;letter-spacing:1px}
.search-wrap input::placeholder{color:var(--t3);font-family:'Noto Sans SC',sans-serif;font-size:13px;letter-spacing:0}
.si{color:var(--t3);font-size:14px;flex-shrink:0}
.tbtn{padding:8px 12px;border-radius:10px;border:none;font-size:13px;font-weight:500;font-family:'Noto Sans SC',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .15s}
.tbtn:active{opacity:.7}
.tbtn-p{background:var(--accent);color:#fff}

/* ── Main ── */
main{padding:12px;width:100%}

/* ── 卡片 ── */
.card-view{display:flex;flex-direction:column;gap:10px}
.fund-card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:hidden;position:relative;width:100%}
.fund-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--flat)}
.fund-card.up-card::before{background:var(--up)}
.fund-card.down-card::before{background:var(--dn)}
.card-top{display:flex;align-items:center;padding:10px 12px 10px 6px;gap:6px}
.card-info{flex:1;min-width:0}
.card-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shield-badge{font-size:10px;color:#60a5fa;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);border-radius:4px;padding:1px 6px;margin-left:4px;vertical-align:middle}
.card-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.drag-handle{color:var(--t3);cursor:grab;font-size:20px;padding:4px 6px;line-height:1;touch-action:none;user-select:none;flex-shrink:0}
.del-btn{font-size:11px;color:var(--t3);background:transparent;border:1px solid var(--bd2);border-radius:6px;padding:4px 10px;cursor:pointer}
.del-btn:active{color:var(--up);border-color:var(--up-bd)}

/* ── 官方数据灰度 ── */
.data-half.stale{opacity:0.35;filter:grayscale(1)}
.data-half.stale .dh-pct{color:var(--t3)!important}

/* ── 展开数据区 ── */
.card-data{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--bd)}
.data-half{padding:12px 12px 14px 14px;overflow:hidden}
.data-half:first-child{border-right:1px solid var(--bd)}
.dh-label{font-size:11px;color:var(--t2);font-weight:500;margin-bottom:4px}
.dh-pct{font-family:'Outfit',sans-serif;font-size:26px;font-weight:600;line-height:1;letter-spacing:-.5px;border-radius:6px;padding:2px 4px;margin-left:-4px;white-space:nowrap;overflow:hidden}
.dh-nav{font-size:12px;color:var(--t2);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dh-nav .nv{color:var(--t1);font-weight:500;font-family:'Outfit',sans-serif}
.dh-time{font-size:11px;color:var(--t2);margin-top:3px}

/* ── 收窄模式 ── */
.fund-card.collapsed .card-data{display:none}
.fund-card.collapsed .card-top{padding:5px 10px 5px 6px;gap:4px}
.fund-card.collapsed .card-name{font-size:13px}
.fund-card.collapsed .del-btn{display:none}
.inline-pct{display:none;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;flex-shrink:0;white-space:nowrap}
.fund-card.collapsed .inline-pct{display:block}

/* ── 骨架 ── */
.sk{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:sk 1.4s infinite;border-radius:4px;display:inline-block}
@keyframes sk{to{background-position:-200% 0}}

/* ── 空状态 ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}

/* ── Sortable ── */
.sortable-ghost{opacity:.2;background:var(--bg4);border:1px dashed var(--accent)}

/* ── 闪烁动画 ── */
@keyframes flashUp{0%{background:rgba(240,68,68,.28)}100%{background:transparent}}
@keyframes flashDown{0%{background:rgba(34,197,94,.28)}100%{background:transparent}}
.flash-up{animation:flashUp .8s ease-out}
.flash-down{animation:flashDown .8s ease-out}

/* ── 桌面表格 ── */
.table-view{display:none}
.fund-table{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.fund-table th{padding:14px 20px;text-align:left;font-size:11px;font-weight:500;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;background:var(--bg3);border-bottom:1px solid var(--bd)}
.fund-table td{padding:16px 20px;border-bottom:1px solid var(--bd);vertical-align:middle}
.fund-table tr:last-child td{border-bottom:none}
.fund-table tbody tr:hover td{background:var(--bg3)}
.tbl-drag{color:var(--t3);cursor:grab;font-size:18px;margin-right:10px;display:inline-block;vertical-align:middle;user-select:none}
.tbl-name{font-size:15px;font-weight:600}
.tbl-code{font-family:'Outfit',sans-serif;font-size:11px;color:var(--t3);margin-top:4px}
.tbl-pct{font-family:'Outfit',sans-serif;font-size:22px;font-weight:600;border-radius:6px;padding:2px 4px;margin-left:-4px}
.tbl-nav{font-size:13px;color:var(--t2);margin-top:5px}
.tbl-nav .nv{color:var(--t1);font-weight:500;font-family:'Outfit',sans-serif}
.tbl-time{font-size:11px;color:var(--t2);margin-top:4px}
.tbl-del{font-size:12px;color:var(--t3);background:transparent;border:1px solid var(--bd2);border-radius:6px;padding:5px 12px;cursor:pointer}
.tbl-del:hover{color:var(--up);border-color:var(--up-bd);background:var(--up-bg)}

/* ── 浅色模式 ── */
@media(prefers-color-scheme:light){
  :root{--bg:#f0f4f8;--bg2:#ffffff;--bg3:#f0f4f8;--bg4:#e2e8f0;--bd:rgba(0,0,0,0.08);--bd2:rgba(0,0,0,0.14);--t1:#1a202c;--t2:#4a5568;--t3:#718096;--accent:#2563eb;--flat:#1a202c;--up:#dc2626;--up-bg:rgba(220,38,38,0.08);--up-bd:rgba(220,38,38,0.3);--dn:#16a34a;--dn-bd:rgba(22,163,74,0.3)}
  .header{background:rgba(240,244,248,0.95)}
  .toolbar{background:rgba(255,255,255,0.95)}
  .card-header-bar{background:rgba(240,244,248,0.95)}
}

/* ══════════════════════════════════════
   调仓预案模块
══════════════════════════════════════ */

/* PE状态条 */
.pe-bar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:8px 16px;display:flex;flex-direction:column;gap:6px}
.pe-bar-top{display:flex;align-items:center;gap:8px;width:100%}
.pe-bar-left{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pe-bar-bottom{display:flex;align-items:center;gap:10px;width:100%}
.pe-label{font-size:11px;color:var(--t3);white-space:nowrap}
.pe-value{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;line-height:1}
.pe-value.pe-danger-up{color:#f59e0b}
.pe-value.pe-danger-dn{color:#3b82f6}
.pe-value.pe-normal{color:var(--t1)}
.pe-status{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500;white-space:nowrap}
.pe-status.triggered-buy{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
.pe-status.triggered-sell{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.pe-status.normal{background:var(--bg3);color:var(--t3);border:1px solid var(--bd)}
/* track：左右两堵墙（买入线/卖出线），中间滑块标记当前位置 */
.pe-track{flex:1;max-width:200px;height:10px;background:var(--bg3);border-radius:5px;position:relative}
.pe-track-marker{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;background:var(--t1);border:2px solid var(--bg2);transform:translate(-50%,-50%);transition:left .3s,background .3s;animation:peMarkerPulse 2s infinite}
@keyframes peMarkerPulse{0%{box-shadow:0 0 0 0 rgba(232,237,245,.6)}70%{box-shadow:0 0 0 5px transparent}100%{box-shadow:0 0 0 0 transparent}}
.pe-track-lo{position:absolute;top:0;bottom:0;width:3px;background:#3b82f6;border-radius:2px}
.pe-track-hi{position:absolute;top:0;bottom:0;width:3px;background:#f59e0b;border-radius:2px}
.pe-input-btn{font-size:11px;color:var(--t3);background:transparent;border:1px solid var(--bd2);border-radius:6px;padding:4px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.pe-input-btn:active{background:var(--bg3)}
.pe-plan-btn{font-size:12px;font-weight:500;padding:6px 14px;border-radius:8px;border:none;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Noto Sans SC',sans-serif}
.pe-plan-btn.buy{background:rgba(59,130,246,.2);color:#60a5fa;border:1px solid rgba(59,130,246,.35)}
.pe-plan-btn.sell{background:rgba(245,158,11,.2);color:#f59e0b;border:1px solid rgba(245,158,11,.35)}
.pe-plan-btn.neutral{background:var(--bg3);color:var(--t3);border:1px solid var(--bd2)}
.pe-plan-btn:active{opacity:.7}

/* 抽屉遮罩 */
.drawer-mask{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-mask.open{opacity:1;pointer-events:all}

/* 抽屉主体 */
.drawer{position:fixed;bottom:0;left:0;right:0;z-index:501;background:var(--bg2);border-radius:16px 16px 0 0;border-top:1px solid var(--bd2);max-height:90vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.67,0)}
.drawer.open{transform:translateY(0)}
.drawer-handle{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:12px auto 0}
.drawer-header{padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);flex-shrink:0}
.drawer-title{font-size:15px;font-weight:600}
.drawer-close{font-size:20px;color:var(--t3);background:none;border:none;cursor:pointer;padding:4px 8px;line-height:1}
.drawer-body{overflow-y:auto;padding:16px;flex:1;-webkit-overflow-scrolling:touch}
.drawer-footer{padding:12px 16px calc(var(--sab) + 12px);border-top:1px solid var(--bd);flex-shrink:0;display:flex;gap:8px}

/* 抽屉内组件 */
.plan-section{margin-bottom:20px}
.plan-section-title{font-size:11px;color:var(--t3);font-weight:500;letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase}

/* 汇总结果 */
.plan-summary{background:var(--bg3);border-radius:10px;padding:14px;border:1px solid var(--bd);margin-bottom:16px}
.ps-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ps-row:last-child{margin-bottom:0;padding-top:8px;border-top:1px solid var(--bd)}
.ps-label{font-size:12px;color:var(--t2)}
.ps-value{font-family:'Outfit',sans-serif;font-size:14px;font-weight:600}
.ps-value.ok{color:#22c55e}
.ps-value.warn{color:#f59e0b}
.ps-value.err{color:#f04444}

/* PE输入弹窗 */
.pe-modal{position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;padding:20px}
.pe-modal-mask{position:absolute;inset:0;background:rgba(0,0,0,.6)}
.pe-modal-box{position:relative;background:var(--bg2);border-radius:16px;padding:24px;width:100%;max-width:320px;border:1px solid var(--bd2)}
.pe-modal-title{font-size:15px;font-weight:600;margin-bottom:6px}
.pe-modal-sub{font-size:12px;color:var(--t3);margin-bottom:16px}
.pe-modal-input{width:100%;background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;color:var(--t1);font-family:'Outfit',sans-serif;font-size:24px;font-weight:600;padding:12px 16px;text-align:center;outline:none;margin-bottom:16px}
.pe-modal-input:focus{border-color:var(--accent)}
.pe-modal-btns{display:flex;gap:8px}
.pe-modal-cancel{flex:1;padding:10px;border-radius:10px;border:1px solid var(--bd2);background:transparent;color:var(--t2);font-size:14px;font-family:'Noto Sans SC',sans-serif;cursor:pointer}
.pe-modal-confirm{flex:2;padding:10px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;font-family:'Noto Sans SC',sans-serif;cursor:pointer}

/* 持仓编辑抽屉 */
.holding-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)}
.holding-row:last-child{border-bottom:none}
.holding-name{flex:1;font-size:13px}
.holding-input{width:110px;background:var(--bg3);border:1px solid var(--bd2);border-radius:6px;color:var(--t1);font-family:'Outfit',sans-serif;font-size:13px;padding:6px 8px;text-align:right;outline:none}
.holding-input:focus{border-color:var(--accent)}
.holding-unit{font-size:11px;color:var(--t3);width:20px}

/* 警告框 */
.plan-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:10px 12px;font-size:12px;color:#f59e0b;margin-bottom:12px}
.plan-err{background:rgba(240,68,68,.1);border:1px solid rgba(240,68,68,.3);border-radius:8px;padding:10px 12px;font-size:12px;color:#f87171;margin-bottom:12px}

/* 桌面适配 */
@media(min-width:768px){
  .drawer{left:50%;transform:translateX(-50%) translateY(100%);max-width:480px;border-radius:16px 16px 0 0}
  .drawer.open{transform:translateX(-50%) translateY(0)}
  .pe-bar{padding:10px 24px}
}

/* ── 桌面响应式 ── */
@media(min-width:768px){
  .idx-bar{grid-template-columns:repeat(6,1fr)}
  .idx-cell{border-bottom:none}
  .idx-cell:nth-child(3n){border-right:1px solid var(--bd)}
  .idx-cell:nth-child(6){border-right:none}
  .idx-chg{font-size:20px}
  .idx-price{font-size:12px}
  .card-header-bar{display:flex!important;position:static;padding:10px 24px}
  #cycleBtn{display:none!important}
  #colBtn{display:none!important}
  main{padding:20px 24px 20px;max-width:1200px;margin:0 auto}
  .card-view{display:none!important}
  .table-view{display:block}
}
</style>
</head>
<body>

<header class="header">
  <div class="hd-left">
    <img src="favicon.png" style="width:32px;height:32px;border-radius:8px;flex-shrink:0">
    <div>
      <div class="hd-title">Jany基金看板</div>
      <div class="hd-sub"><span class="mkt-dot" id="mktDot"></span><span id="mktLabel">检测中</span></div>
    </div>
  </div>
  <div class="hd-right">
    <div class="hd-time" id="liveTime">--:--:--</div>
    <div class="hd-date" id="liveDate">----/--/--</div>
  </div>
</header>

<div class="idx-bar" id="idxBar">
  <div class="idx-cell"><div class="idx-lbl">沪深300</div><div class="idx-row"><span class="sk" style="width:44px;height:16px"></span></div></div>
  <div class="idx-cell"><div class="idx-lbl">中证A500</div><div class="idx-row"><span class="sk" style="width:44px;height:16px"></span></div></div>
  <div class="idx-cell"><div class="idx-lbl">中证500</div><div class="idx-row"><span class="sk" style="width:44px;height:16px"></span></div></div>

<script>
// ── 时钟 ──
const DAYS=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
let _mktOpen=null;
function updateClock(){
  const n=new Date();
  document.getElementById('liveTime').textContent=
    [n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
  document.getElementById('liveDate').textContent=
    `${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')} ${DAYS[n.getDay()]}`;
  const d=n.getDay(),t=n.getHours()*60+n.getMinutes();
  const weekend=d===0||d===6;
  const open=!weekend&&((t>=570&&t<690)||(t>=780&&t<900));
  if(open!==_mktOpen){
    _mktOpen=open;
    document.getElementById('mktDot').className='mkt-dot'+(open?' open':'');
    document.getElementById('mktLabel').textContent=weekend?'休市·周末':open?'交易中':
      t<570?'盘前':t<900?(t<690?'午间休市':'盘后'):'已收盘';
  }
}
setInterval(updateClock,1000);updateClock();

// ── 指数 ──
const INDICES=[
  {id:'000300',lbl:'沪深300'},{id:'000510',lbl:'中证A500'},
  {id:'000905',lbl:'中证500'},{id:'H30269',lbl:'红利低波'},
  {id:'000012',lbl:'国债指数'},{id:'HSI',lbl:'恒生指数'},
];
const idxPrev={};
function fetchIndices(){
  return new Promise(resolve=>{
    const cb='_idx_'+Date.now();let done=false;
    const fin=()=>{if(!done){done=true;resolve();}};
    window[cb]=function(data){
      fin();delete window[cb];
      const diff=data?.data?.diff;if(!diff)return;
      const map={};diff.forEach(d=>{map[d.f12]=d;});
      document.getElementById('idxBar').innerHTML=INDICES.map(idx=>{
        const d=map[idx.id];
        if(!d||!d.f2)return`<div class="idx-cell" data-id="${idx.id}"><div class="idx-lbl">${idx.lbl}</div><div class="idx-row"><div class="idx-chg flat">—</div></div></div>`;
        const price=typeof d.f2==='number'?d.f2.toFixed(2):String(d.f2);
        const pct=d.f3??0;
        const cls=pct>0?'up':pct<0?'down':'flat';
        const sign=pct>0?'+':'';
        const old=idxPrev[idx.id];
        const flash=old&&old!==price?(parseFloat(price)>parseFloat(old)?'flash-up':'flash-down'):'';
        idxPrev[idx.id]=price;
        return`<div class="idx-cell ${cls} ${flash}" data-id="${idx.id}">
          <div class="idx-lbl">${idx.lbl}</div>
          <div class="idx-row">
            <div class="idx-chg ${cls}">${sign}${typeof pct==='number'?pct.toFixed(2):pct}%</div>
            <div class="idx-price">${price}</div>
          </div>
        </div>`;
      }).join('');
    };
    const s=document.createElement('script');
    s.src=`https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&fields=f2,f3,f12,f14&secids=1.000300,1.000510,1.000905,2.H30269,1.000012,116.HSI,124.HSI,100.HSI&cb=${cb}&_=${Date.now()}`;
    s.onerror=fin;setTimeout(fin,5000);document.head.appendChild(s);
  });
}

// ── 基金 ──
const DEFAULT_CODES=['003949','160622','110027','011554','007466','004496','110020','007028'];
const NAMES={
  '003949':'兴全稳泰债券A','160622':'鹏华丰利债券LOF','110027':'易方达安心回报A',
  '011554':'海富通欣利混合A','007466':'华泰柏瑞红利低波联接A','004496':'前海开源多元策略A',
  '110020':'易方达沪深300联接A','022439':'华泰柏瑞A500联接C','007028':'易方达中证500联接A'
};
const STORE='fm_v20';
let funds=[];
function loadFunds(){const c=localStorage.getItem(STORE);funds=(c&&c!=='[]')?JSON.parse(c):[...DEFAULT_CODES];}
function saveFunds(){localStorage.setItem(STORE,JSON.stringify(funds));}

// 估算接口：并发请求
window.jsonpResolvers={};
window.jsonpgz=function(data){
  if(data?.fundcode&&window.jsonpResolvers[data.fundcode]){
    window.jsonpResolvers[data.fundcode](data);delete window.jsonpResolvers[data.fundcode];
  }
};
function fetchEst(code){
  return new Promise(resolve=>{
    let done=false;
    const fin=v=>{if(!done){done=true;delete window.jsonpResolvers[code];resolve(v);}};
    window.jsonpResolvers[code]=fin;
    const s=document.createElement('script');
    s.src=`https://fundgz.1234567.com.cn/js/${code}.js?rt=${Date.now()}`;
    s.onerror=()=>fin(null);setTimeout(()=>fin(null),3000);document.head.appendChild(s);
  });
}

// 官方净值：F10接口，串行
const offQ=[];let offBusy=false;
function fetchOff(code){return new Promise(r=>{offQ.push({code,resolve:r});drainOff();});}
function drainOff(){
  if(offBusy||!offQ.length)return;offBusy=true;
  const{code,resolve}=offQ.shift();let done=false;
  const fin=v=>{if(!done){done=true;window.apidata=undefined;resolve(v);offBusy=false;setTimeout(drainOff,30);}};
  const s=document.createElement('script');
  s.src=`https://fund.eastmoney.com/f10/F10DataApi.aspx?type=lsjz&code=${code}&page=1&per=1&v=${Date.now()}`;
  s.onload=()=>{
    try{
      const html=window.apidata?.content;
      if(html){
        const tr=html.match(/<tbody>\s*<tr>(.*?)<\/tr>/i);
        if(tr){
          const tds=tr[1].match(/<td[^>]*>(.*?)<\/td>/g).map(td=>td.replace(/<[^>]+>/g,'').trim());
          if(tds.length>=4){
            const date=tds[0],nav=tds[1];
            let pct=null;
            if(tds[3]&&tds[3]!=='---')pct=parseFloat(tds[3].replace('%',''));
            fin({nav:Number(nav).toFixed(4),pct:pct!=null?pct.toFixed(2):null,date});
            return;
          }
        }
      }
      fin(null);
    }catch(e){fin(null);}
  };
  s.onerror=()=>fin(null);setTimeout(()=>fin(null),3000);document.head.appendChild(s);
}

async function fetchSingleFund(code){
  const[est,off]=await Promise.all([fetchEst(code),fetchOff(code)]);
  if(!est&&!off)return{code,error:true};
  return{code,error:false,
    name:est?.name||NAMES[code]||`基金 ${code}`,
    estPct:est?.gszzl!=null&&est.gszzl!==''?parseFloat(est.gszzl):null,
    estVal:est?.gsz||null,estTime:est?.gztime||null,
    offPct:off?.pct!=null?parseFloat(off.pct):null,
    offVal:off?.nav||est?.dwjz||null,offDate:off?.date||est?.jzrq||null,
  };
}

// ── 状态 ──
const prevData={};
let allCollapsed=false;
let miniMode=0;
const miniLabels=['盘中估算','官方数据','估算|官方'];
let cardSortable=null,tblSortable=null;
let _lastResults=[];

function fp(v){
  if(v==null)return{cls:'flat',txt:'--'};
  return{cls:v>0?'up':v<0?'down':'flat',txt:(v>0?'+':'')+v.toFixed(2)+'%'};
}

function todayDateStr(){
  return new Date().toLocaleDateString('zh-CN',{timeZone:'Asia/Shanghai',year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');
}

function toggleAllCollapse(){
  allCollapsed=!allCollapsed;
  document.getElementById('colBtn').textContent=allCollapsed?'展开':'收窄';
  document.getElementById('cycleBtn').style.display=allCollapsed?'':'none';
  document.body.classList.toggle('collapsed-mode',allCollapsed);
  if(_lastResults.length)renderAll(_lastResults);
}

function cycleMiniMode(){
  miniMode=(miniMode+1)%3;
  document.getElementById('cycleBtn').textContent=miniLabels[miniMode];
  if(_lastResults.length)renderAll(_lastResults);
}

function calcFlash(results){
  const fl={};
  results.forEach(f=>{
    if(f.error){fl[f.code]={ef:'',of2:''};return;}
    const pr=prevData[f.code];
    fl[f.code]={
      ef:pr&&pr.estPct!==f.estPct&&f.estPct!=null?(f.estPct>(pr.estPct||0)?'flash-up':'flash-down'):'',
      of2:pr&&pr.offPct!==f.offPct&&f.offPct!=null?(f.offPct>(pr.offPct||0)?'flash-up':'flash-down'):'',
    };
  });
  results.forEach(f=>{if(!f.error)prevData[f.code]={estPct:f.estPct,offPct:f.offPct};});
  return fl;
}

function renderAll(results){
  _lastResults=results;
  updatePeBar(); // 数据加载完后更新PE状态条和权益显示
  const fl=calcFlash(results);
  const today=todayDateStr();
  const now=new Date(),wd=now.getDay(),hm=now.getHours()*60+now.getMinutes();
  const tradingDay=wd>=1&&wd<=5&&hm>=540;
  renderCards(results,fl,today,tradingDay);
  renderTable(results,fl,today,tradingDay);
  if(results.length)document.getElementById('cardHeaderBar').style.display='flex';
}

function inlinePctHtml(ep,op,stale,ef,of2){
  if(miniMode===0)return`<span class="inline-pct ${ep.cls} ${ef}">${ep.txt}</span>`;
  if(miniMode===1)return`<span class="inline-pct ${stale?'flat':op.cls} ${of2}">${op.txt}</span>`;
  return`<span class="inline-pct"><span class="${ep.cls} ${ef}">${ep.txt}</span><span style="color:var(--t3);margin:0 3px">|</span><span class="${stale?'flat':op.cls} ${of2}">${op.txt}</span></span>`;
}

function renderCards(results,fl,today,tradingDay){
  const html=results.map(f=>{
    if(f.error)return`<div class="fund-card" data-code="${f.code}">
      <div class="card-top"><span class="drag-handle">⠿</span><div class="card-info"><div class="card-name" style="color:var(--t3)">${NAMES[f.code]||f.code}</div></div>
      <div class="card-actions"><button class="del-btn" onclick="delFund('${f.code}')">删除</button></div></div>
      <div style="padding:10px 16px 14px;font-size:12px;color:var(--t3);border-top:1px solid var(--bd)">⚠ 获取超时，请刷新</div></div>`;
    const ep=fp(f.estPct),op=fp(f.offPct);
    const cc=f.estPct!=null?(f.estPct>0?'up-card':f.estPct<0?'down-card':''):'';
    const{ef,of2}=(fl||{})[f.code]||{ef:'',of2:''};
    const sh=f.code==='022439'?'<span class="shield-badge">🛡</span>':'';
    const estDateToday=f.estTime&&f.estTime.slice(0,10)===today;
    const isStale=(estDateToday||tradingDay)&&(!f.offDate||f.offDate.slice(0,10)<today);
    const inlinePct=inlinePctHtml(ep,op,isStale,ef,of2);
    return`<div class="fund-card ${cc}${allCollapsed?' collapsed':''}" data-code="${f.code}">
      <div class="card-top">
        <span class="drag-handle">⠿</span>
        <div class="card-info"><div class="card-name">${f.name}${sh}</div></div>
        ${inlinePct}
        <div class="card-actions"><button class="del-btn" onclick="delFund('${f.code}')">删除</button></div>
      </div>
      <div class="card-data">
        <div class="data-half"><div class="dh-label">盘中估算</div><div class="dh-pct ${ep.cls} ${ef}">${ep.txt}</div><div class="dh-nav">净值 <span class="nv">${f.estVal||'--'}</span></div><div class="dh-time">${f.estTime||'--'}</div></div>
        <div class="data-half${isStale?' stale':''}"><div class="dh-label">官方数据</div><div class="dh-pct ${op.cls} ${of2}">${op.txt}</div><div class="dh-nav">净值 <span class="nv">${f.offVal||'--'}</span></div><div class="dh-time">${f.offDate||'--'}</div></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('cardView').innerHTML=html||`<div class="empty-state"><div class="empty-icon">📭</div><div>暂无关注基金</div></div>`;
}

function renderTable(results,fl,today,tradingDay){
  const html=results.map(f=>{
    if(f.error)return`<tr data-code="${f.code}"><td><span class="tbl-drag">⠿</span><div style="display:inline-block;vertical-align:top"><div class="tbl-name" style="color:var(--t3)">${NAMES[f.code]||f.code}</div><div class="tbl-code">${f.code}</div></div></td><td colspan="2" style="color:var(--t3);font-size:12px">⚠ 获取超时</td><td><button class="tbl-del" onclick="delFund('${f.code}')">删除</button></td></tr>`;
    const ep=fp(f.estPct),op=fp(f.offPct);
    const{ef,of2}=(fl||{})[f.code]||{ef:'',of2:''};
    const sh=f.code==='022439'?' 🛡':'';
    const estDateToday=f.estTime&&f.estTime.slice(0,10)===today;
    const tblStale=(estDateToday||tradingDay)&&(!f.offDate||f.offDate.slice(0,10)<today);
    return`<tr data-code="${f.code}">
      <td><span class="tbl-drag">⠿</span><div style="display:inline-block;vertical-align:top"><div class="tbl-name">${f.name}${sh}</div><div class="tbl-code">${f.code}</div></div></td>
      <td><div class="tbl-pct ${ep.cls} ${ef}">${ep.txt}</div><div class="tbl-nav">净值 <span class="nv">${f.estVal||'--'}</span></div><div class="tbl-time">${f.estTime||'--'}</div></td>
      <td style="${tblStale?'opacity:0.35;filter:grayscale(1)':''}"><div class="tbl-pct ${op.cls} ${of2}">${op.txt}</div><div class="tbl-nav">净值 <span class="nv">${f.offVal||'--'}</span></div><div class="tbl-time">${f.offDate||'--'}</div></td>
      <td><button class="tbl-del" onclick="delFund('${f.code}')">删除</button></td>
    </tr>`;
  }).join('');
  document.getElementById('fundTbody').innerHTML=html;
}

// ── 刷新 ──
async function refreshData(){
  const miniRefBtn=document.getElementById('miniRefBtn');
  if(miniRefBtn){miniRefBtn.textContent='↻';miniRefBtn.disabled=true;}
  loadFunds();fetchIndices();
  if(!funds.length){
    document.getElementById('cardView').innerHTML=`<div class="empty-state"><div class="empty-icon">📭</div><div>暂无关注基金，输入代码添加</div></div>`;
    document.getElementById('fundTbody').innerHTML=`<tr><td colspan="4" style="text-align:center;padding:50px;color:var(--t3)">暂无关注基金</td></tr>`;
    if(miniRefBtn){miniRefBtn.textContent='↻ 刷新';miniRefBtn.disabled=false;}
    return;
  }
  const results=await Promise.all(funds.map(fetchSingleFund));
  renderAll(results);
  if(miniRefBtn){miniRefBtn.textContent='↻ 刷新';miniRefBtn.disabled=false;}
  if(cardSortable)cardSortable.destroy();
  if(tblSortable)tblSortable.destroy();
  const onEnd=evt=>{
    const o=Array.from(evt.to.children).map(el=>el.dataset.code).filter(Boolean);
    if(o.length===funds.length){funds=o;saveFunds();}
  };
  cardSortable=Sortable.create(document.getElementById('cardView'),{handle:'.drag-handle',animation:200,ghostClass:'sortable-ghost',onEnd});
  tblSortable=Sortable.create(document.getElementById('fundTbody'),{handle:'.tbl-drag',animation:200,ghostClass:'sortable-ghost',onEnd});
}

function addFund(){
  const input=document.getElementById('codeInput');
  const code=input.value.trim();
  if(/^\d{6}$/.test(code)&&!funds.includes(code)){funds.push(code);saveFunds();input.value='';refreshData();}
  else input.value='';
}
function delFund(code){funds=funds.filter(c=>c!==code);saveFunds();refreshData();}
// clearFunds()：控制台调用备用
function clearFunds(){if(confirm('确定清空全部基金？')){funds=[];saveFunds();refreshData();}}
document.getElementById('codeInput').addEventListener('keydown',e=>{if(e.key==='Enter')addFund();});

// ── 调试（隐藏）──
function testFlash(){
  if(!_lastResults.length){alert('请等数据加载完毕');return;}
  renderAll(_lastResults.map(f=>f.error?f:({...f,
    estPct:(f.estPct||0)+(Math.random()>0.5?0.5:-0.5),

  '110020':'易方达沪深300','022439':'A500C','007028':'中证500联接',

function getShortName(code){

}

// PE触发死区
const PE_LO = 64.5; // 买入线

const PE_EQUITY_TABLE = [
  {lo:80,hi:999,target:20},{lo:75,hi:80,target:22},{lo:70,hi:75,target:25},
  {lo:65,hi:70,target:29},{lo:60,hi:65,target:34},{lo:55,hi:60,target:40},

];

// ── 工具函数 ──
function fmt(n, decimals=0){ // 千分位格式化
  if(n==null||isNaN(n))return '--';
  return n.toLocaleString('zh-CN',{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
}
function fmtMoney(n){ return '¥'+fmt(n,0); }   // ¥1,234
function fmtShares(n){ return fmt(n,2)+' 份'; } // 1,234.56 份

// 抽屉里用简称
function getProductName(code){
  return getShortName(code);
}

function getTargetEquity(pe){
  const r=PE_EQUITY_TABLE.find(r=>pe>=r.lo&&pe<r.hi);
  return r?r.target:null;
}

// 从_lastResults取净值（页面数据加载完后始终有效）
function getNavByCode(code){
  const f=_lastResults.find(r=>r.code===code);
  if(!f)return null;
  return f.estVal?parseFloat(f.estVal):(f.offVal?parseFloat(f.offVal):null);
}

// 计算当前权益暴露（只用_lastResults里有净值的产品）
function calcCurrentEquity(holdings){
  let total=0,eq=0;
  PRODUCTS.forEach(p=>{
    const shares=holdings[p.code]||0;
    if(!shares)return;
    const nav=getNavByCode(p.code);
    if(!nav)return;
    const val=shares*nav;
    total+=val; eq+=val*p.equity;
  });
  return total>0?{equity:eq/total*100,total}:null;
}

// ── 存储 ──
function loadPe(){
  const s=localStorage.getItem(STORE_PE);
  return s?{value:parseFloat(s),date:localStorage.getItem(STORE_PE_DATE)}:null;
}
function savePe(v){
  localStorage.setItem(STORE_PE,String(v));
  localStorage.setItem(STORE_PE_DATE,new Date().toLocaleDateString('zh-CN',{timeZone:'Asia/Shanghai'}));
}
function loadHoldings(){
  const c=localStorage.getItem(STORE_HOLDINGS);
  return c?{...DEFAULT_HOLDINGS,...JSON.parse(c)}:{...DEFAULT_HOLDINGS};
}
function saveHoldingsData(h){localStorage.setItem(STORE_HOLDINGS,JSON.stringify(h));}

// updatePeBar在refreshData完成后由renderAll调用，确保_lastResults有数据
function updatePeBar(){
  const pe=loadPe();
  const display=document.getElementById('peDisplay');
  const status=document.getElementById('peStatus');
  const marker=document.getElementById('peTrackMarker');
  const planBtn=document.getElementById('planBtn');
  const eqDiv=document.getElementById('peEquityInfo');

  if(!pe){
    display.textContent='--.--%'; display.className='pe-value pe-normal';
    status.textContent='未输入PE'; status.className='pe-status normal';
    planBtn.className='pe-plan-btn neutral'; planBtn.textContent='待机预案';
    if(marker)marker.style.left='0%'; if(eqDiv)eqDiv.style.display='none';
    return;
  }

  const v=pe.value;
  display.textContent=v.toFixed(2)+'%';
  // bar以死区中值为中心，±15范围，当前PE滑块动态偏移
  const PE_MID=(PE_LO+PE_HI)/2; // 67.0%
  const RANGE=10;
  const peMin=PE_MID-RANGE, peMax=PE_MID+RANGE;
  const toPos=pe=>Math.min(Math.max((pe-peMin)/(peMax-peMin)*100,0),100);
  if(marker)marker.style.left=toPos(v)+'%';
  const loEl=document.getElementById('peTrackLo');
  const hiEl=document.getElementById('peTrackHi');
  if(loEl)loEl.style.left=toPos(PE_LO)+'%';
  if(hiEl)hiEl.style.left=toPos(PE_HI)+'%';

  // 权益偏离显示（此时_lastResults已有数据）
  if(eqDiv){
    const holdings=loadHoldings();
    const eq=calcCurrentEquity(holdings);
    const target=getTargetEquity(v);
    if(eq&&target!=null){
      const diff=eq.equity-target;
      const sign=diff>0?'+':'';
      // 颜色：超配橙警告，欠配蓝提示，方向错误红色
      const wrongDir=(v>=65&&diff>2)||(v<65&&diff<-2);
      const col=wrongDir?'#f87171':(diff>0?'#f59e0b':'#60a5fa');
      eqDiv.innerHTML=`目标<b>${target}%</b> 实际<b style="color:${col}">${eq.equity.toFixed(1)}%</b> <span style="color:${col}">${sign}${diff.toFixed(1)}%</span>`;
      eqDiv.style.display='flex';
    } else {
      eqDiv.style.display='none';
    }
  }

  if(v<=PE_LO){
    display.className='pe-value pe-danger-dn';
    status.textContent='▲ 增权信号'; status.className='pe-status triggered-buy';
    planBtn.className='pe-plan-btn buy'; planBtn.textContent='▲ 增权预案';
    if(marker)marker.style.background='#3b82f6';
  } else if(v>=PE_HI){
    display.className='pe-value pe-danger-up';
    status.textContent='▼ 降权信号'; status.className='pe-status triggered-sell';
    planBtn.className='pe-plan-btn sell'; planBtn.textContent='▼ 降权预案';
    if(marker)marker.style.background='#f59e0b';
  } else {
    display.className='pe-value pe-normal';
    status.textContent='待机'; status.className='pe-status normal';
    planBtn.className='pe-plan-btn neutral'; planBtn.textContent='待机预案';
    if(marker)marker.style.background='var(--t1)';
  }
}

function cleanOldHoldings(){
  const valid=new Set(PRODUCTS.map(p=>p.code));
  const h=loadHoldings();
  const old=Object.keys(h).filter(k=>!valid.has(k));
  if(!old.length){alert('✅ 无旧数据，无需清理');return;}
  if(!confirm(`发现旧产品：${old.join(', ')}，确认清除？`))return;
  old.forEach(k=>delete h[k]);

}

            <div style="font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;color:#f87171">${SELL_TARGET}%</div></div>
          <div><div style="font-size:10px;color:var(--t3)">需减权益金额</div>
            <div style="font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;color:#f59e0b">${sellNeededEq!=null?fmtMoney(sellNeededEq):'--'}</div></div>
        </div>
        <div style="font-size:11px;color:var(--t3);margin-bottom:10px">填比例（整数，空=不参与）→ 系统按比例分配卖出金额，0.5%摩擦自动计入兴全到账</div>
        ${funds.map(code=>PRODUCTS.find(p=>p.code===code)).filter(p=>p&&p.equity>0).map(p=>{
          const shares=holdings[p.code]||0;
          const nav=getNavByCode(p.code)||null;
          const val=nav?shares*nav:null;
          const saved=savedPlan[p.code]||'';
          return`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:8px;margin-bottom:6px">
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;font-weight:500">${getProductName(p.code)}</div>
              <div style="font-size:10px;color:var(--t3)">${val!=null?fmtMoney(val):'--'} · 权益${Math.round(p.equity*100)}%</div>
            </div>
            <div style="text-align:right;min-width:90px;font-size:11px;color:var(--t3)" id="sell_calc_${p.code}">-- 元<br>-- 份</div>
            <input type="tel" inputmode="numeric" pattern="[0-9]*" placeholder="比例"
              style="width:50px;font-size:16px;background:var(--bg);border:1px solid var(--bd2);border-radius:6px;color:var(--t1);font-family:'Outfit',sans-serif;font-size:14px;padding:5px 6px;text-align:center;outline:none"
              id="ratio_${p.code}" value="${saved}" type="tel" inputmode="numeric" pattern="[0-9]*" oninput="calcSellPreview()" onchange="calcSellPreview()" onkeyup="calcSellPreview()">
          </div>`;
        }).join('')}
        <div style="margin-top:10px;padding:10px;background:var(--bg3);border-radius:8px" id="sell_preview_result">
          <span style="font-size:12px;color:var(--t3)">填写比例后显示操作结果</span>
        </div>
      </div>
    </div>`;

  // 有已保存比例则自动计算
  if(Object.keys(savedPlan).length) calcSellPreview();
}

function saveSellPlan(){
  const plan={};
  funds.map(code=>PRODUCTS.find(p=>p.code===code)).filter(p=>p&&p.equity>0).forEach(p=>{
    const v=document.getElementById('ratio_'+p.code)?.value||'';
    if(v)plan[p.code]=v;
  });
  localStorage.setItem('jy_sell_plan_v1',JSON.stringify(plan));
  // 确保抽屉关闭（手机端兼容）
  document.getElementById('drawerMask').classList.remove('open');
  document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('open'));
}

function calcSellPreview(){
  const holdings=loadHoldings();
  const eqResult=calcCurrentEquity(holdings);
  if(!eqResult)return;
  const SELL_TARGET=25.0;
  const {equity:currentEq,total:totalVal}=eqResult;
  const currentEqVal=totalVal*currentEq/100;
  const targetEqVal=totalVal*SELL_TARGET/100;
  const sellNeededEq=Math.max(0,currentEqVal-targetEqVal);

  const sellProducts=funds.map(code=>PRODUCTS.find(p=>p.code===code)).filter(p=>p&&p.equity>0);
  let totalRatio=0;
  const ratios={};
  sellProducts.forEach(p=>{
    const v=parseFloat(document.getElementById('ratio_'+p.code)?.value)||0;
    ratios[p.code]=v; totalRatio+=v;
  });

  if(!totalRatio){
    document.getElementById('sell_preview_result').innerHTML='<span style="font-size:12px;color:var(--t3)">填写比例后显示操作结果</span>';
    sellProducts.forEach(p=>{const el=document.getElementById('sell_calc_'+p.code);if(el)el.innerHTML='-- 元<br>-- 份';});
    return;
  }

  // 按比例分配各产品需减少的权益金额配额，再除以equity系数得实际卖出额
  // 权益计算用卖出全额（0.5%费率不影响权益计算）
  // 兴全到账 = sum(各产品卖出额 × (1-fee))，A500C/中证500C fee=0，其余fee=0.5%
  const FEE=0.005;
  let afterEqVal=currentEqVal;
  let totalXqAmt=0;

  sellProducts.forEach(p=>{
    const el2=document.getElementById('sell_calc_'+p.code);
    if(!ratios[p.code]){if(el2)el2.innerHTML='-- 元<br>-- 份';return;}
    const eqQuota=sellNeededEq*(ratios[p.code]/totalRatio);
    const sellAmt=eqQuota/p.equity;
    const nav=getNavByCode(p.code)||1.0;
    const maxSell=(holdings[p.code]||0)*nav;
    const actualSell=Math.min(sellAmt,maxSell);
    const fee=p.equity<1?FEE:0; // 枷锁层0.5%，可调度层0摩擦
    const xqAmt=actualSell*(1-fee);

    afterEqVal-=actualSell*p.equity; // 权益减少按卖出全额
    totalXqAmt+=xqAmt;

    const el=document.getElementById('sell_calc_'+p.code);
    if(el)el.innerHTML=`<span style="font-family:'Outfit',sans-serif;font-weight:600;color:var(--t1)">${fmt(actualSell/nav,2)} <span style='color:var(--t3);font-weight:400'>份</span></span><br><span style="font-size:11px;color:var(--t3)">${fmtMoney(actualSell)}</span>`;
  });

  const afterEqPct=afterEqVal/totalVal*100;
  const xqNav=getNavByCode('003949')||1.0;

  document.getElementById('sell_preview_result').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;font-size:12px">
      <div><div style="color:var(--t3);font-size:10px">操作后权益</div>
        <div style="font-family:'Outfit',sans-serif;font-weight:700;font-size:16px;color:#22c55e">${afterEqPct.toFixed(1)}%</div></div>
      <div><div style="color:var(--t3);font-size:10px">兴全到账</div>
        <div style="font-family:'Outfit',sans-serif;font-weight:600;font-size:14px;color:var(--t1)">${fmtMoney(totalXqAmt)}</div></div>
      <div><div style="color:var(--t3);font-size:10px">兴全买入份额</div>
        <div style="font-family:'Outfit',sans-serif;font-weight:600;font-size:14px;color:var(--t1)">${fmt(totalXqAmt/xqNav,2)} <span style="color:var(--t3);font-weight:400;font-size:12px">份</span></div></div>
    </div>`;
}
function confirmPlan(){
  if(!confirm('确认已在基金平台完成操作？将同步更新本地持仓份额。'))return;
  const h=loadHoldings();
  if(_planMode==='buy'){
    const sellAmt=parseFloat(document.getElementById('sell_003949')?.value)||0;
    const xqNav=getNavByCode('003949')||1.0;
    const a500Nav=getNavByCode('022439')||1.0;
    h['003949']=Math.max(0,(h['003949']||0)-(sellAmt/xqNav));
    h['022439']=(h['022439']||0)+(sellAmt/a500Nav);
  } else if(_planMode==='sell'){
    const xqNav=getNavByCode('003949')||1.0;
    let totalAmt=0;
    PRODUCTS.filter(p=>p.code!=='003949').forEach(p=>{
      const chk=document.getElementById('chk_'+p.code);
      if(chk&&chk.checked){
        const amt=parseFloat(document.getElementById('sell_'+p.code)?.value)||0;
        const nav=getNavByCode(p.code)||1.0;
        h[p.code]=Math.max(0,(h[p.code]||0)-(amt/nav));
        totalAmt+=amt;
      }
    });
    h['003949']=(h['003949']||0)+(totalAmt/xqNav);
  }
  saveHoldingsData(h);closeAllDrawers();
  alert('✅ 持仓已更新！建议立即导出备份。');
}

// ── 抽屉控制 ──
function openDrawer(id){
  document.getElementById('drawerMask').classList.add('open');
  document.getElementById(id).classList.add('open');
}
function closeAllDrawers(){
  document.getElementById('drawerMask').classList.remove('open');
  document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('open'));
}

// ── 删除确认 ──
function delFund(code){
  if(!confirm(`确认删除「${NAMES[code]||code}」？`))return;
  funds=funds.filter(c=>c!==code);saveFunds();refreshData();
}

// ── 启动 ──
// updatePeBar在renderAll里调用（数据加载完后），页面初始化时先用已存PE渲染文字部分
updatePeBar();
refreshData();
setInterval(fetchIndices,10000);
setInterval(refreshData,60000);
</script>
