<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <!-- mobile-web-app-capable 是标准名，apple- 前缀那个是 iOS 历史写法，两个都留 -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="Fund M" />
        <!-- 必须与 css/style.css 的 --bg 一致，否则状态栏/启动图和实际底色差一截。
             #0a0e14 是配色改版前的冷蓝旧值，改版时（--bg 去蓝光转 #121417）漏改了这里。 -->
        <meta
            name="theme-color"
            content="#121417"
            media="(prefers-color-scheme: dark)"
        />
        <meta
            name="theme-color"
            content="#f0f4f8"
            media="(prefers-color-scheme: light)"
        />

        <title>Fund M</title>

        <link rel="icon" href="favicon.png" />
        <link rel="apple-touch-icon" href="favicon.png" />
        <link rel="manifest" href="manifest.webmanifest" />
        <link rel="stylesheet" href="css/style.css?v=20260703-depth" />

        <!-- defer：CDN 慢/被墙时不阻塞首屏渲染（否则整页卡在“系统初始化中”）；
             Sortable 仅在 refreshData 拉数后异步用到，defer 执行时机足够早 -->
        <script
            defer
            src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"
        ></script>
    </head>
    <body>
        <header class="header">
            <div class="hd-left" onclick="location.reload()">
                <img
                    src="favicon.png"
                    alt="logo"
                    style="
                        width: 32px;
                        height: 32px;
                        border-radius: 8px;
                        flex-shrink: 0;
                    "
                />
                <div>
                    <div class="hd-title">Fund M</div>
                    <div class="hd-sub">
                        <span class="mkt-dot" id="mktDot"></span>
                        <span id="mktLabel">检测中</span>
                    </div>
                </div>
            </div>
            <div class="hd-right">
                <div class="hd-time num" id="liveTime">--:--:--</div>
                <div class="hd-date" id="liveDate">----/--/--</div>
            </div>
        </header>

        <div class="idx-bar" id="idxBar"></div>

        <div class="pe-bar" id="peBar">
            <div class="pe-bar-top">
                <div class="pe-bar-left">
                    <span class="pe-label">PE</span>
                    <span class="pe-value pe-normal num" id="peDisplay"
                        >--.--%</span
                    >
                    <span class="pe-status normal" id="peStatus">待机</span>
                </div>

                <div
                    id="pcProfitArea"
                    style="margin-left: 32px; align-items: center; gap: 8px"
                >
                    <span
                        style="
                            font-size: 13px;
                            color: var(--t3);
                            font-weight: 500;
                        "
                        >最新收益</span
                    >
                    <span
                        id="todayProfitPc"
                        class="num"
                        style="
                            font-size: 18px;
                            font-weight: 600;
                            display: flex;
                            align-items: center;
                        "
                    ></span>
                </div>

                <div style="flex: 1"></div>

                <button
                    class="chb-btn"
                    id="miniRefBtnPc"
                    onclick="refreshData(true)"
                    style="margin-right: 24px"
                >
                    ↻ 刷新
                </button>
                <button class="pe-input-btn" onclick="openPeModal()">
                    定档
                </button>
                <button
                    class="pe-input-btn"
                    id="holdingBtn"
                    onclick="openHoldingDrawer()"
                >
                    持仓
                </button>
            </div>

            <div class="pe-bar-bottom">
                <div class="pe-track" id="peTrack">
                    <div
                        class="pe-track-lo"
                        id="peTrackLo"
                        style="display: none"
                    ></div>
                    <div
                        class="pe-track-hi"
                        id="peTrackHi"
                        style="display: none"
                    ></div>
                    <div
                        class="pe-track-marker"
                        id="peTrackMarker"
                        style="display: none"
                    ></div>
                    <div
                        class="pe-track-popup"
                        id="peTrackPopup"
                        style="display: none"
                    ></div>
                </div>
                <div
                    id="peEquityInfo"
                    style="
                        display: none;
                        font-size: 11px;
                        color: var(--t3);
                        gap: 4px;
                        align-items: baseline;
                        flex-shrink: 0;
                        white-space: nowrap;
                        margin-left: auto;
                    "
                ></div>
            </div>
        </div>

        <main>
            <div class="card-header-bar" id="cardHeaderBar">
                <div
                    style="
                        flex: 1;
                        display: flex;
                        align-items: center;
                        min-width: 0;
                        overflow: hidden;
                        padding-right: 12px;
                    "
                >
                    <span
                        class="chb-title"
                        style="flex: none; padding-right: 8px"
                        >最新收益</span
                    >
                    <span
                        id="todayProfit"
                        class="num"
                        style="
                            font-size: 16px;
                            font-weight: 600;
                            white-space: nowrap;
                            overflow: hidden;
                            text-overflow: ellipsis;
                            display: flex;
                            align-items: center;
                        "
                    ></span>
                </div>
                <div class="chb-actions">
                    <button
                        class="chb-btn"
                        id="miniRefBtn"
                        onclick="refreshData(true)"
                    >
                        ↻ 刷新
                    </button>
                    <button
                        class="chb-btn"
                        id="cycleBtn"
                        onclick="cycleMiniMode()"
                    >
                        估算
                    </button>
                </div>
                <div
                    id="colBtn"
                    class="col-handle"
                    onclick="toggleAllCollapse()"
                >
                    ▾
                </div>
                <!-- 官方数据源标签（手机）。**必须留在 .card-header-bar 内部**：它和 #colBtn
                     一样是 absolute 挂在这条 sticky 上的，浮在下沿的空隙里，不占布局高度。
                     挪到 bar 外面就会变成一个独立行、把卡片整体往下推 22px。见 D-023 -->
                <div class="card-src-tags" id="cardSrcTags"></div>
            </div>

            <div class="card-view" id="cardView">
                <div class="empty-state loading-pulse">
                    <div class="empty-icon">⏳</div>
                    <div
                        style="
                            font-size: 15px;
                            font-weight: 600;
                            color: var(--t2);
                            margin-bottom: 6px;
                        "
                    >
                        系统初始化中
                    </div>
                    <div style="font-size: 12px; color: var(--t3)">
                        正在连接数据源并进行测算...
                    </div>
                </div>
            </div>

            <div class="table-view" id="tableView">
                <table class="fund-table">
                    <thead>
                        <tr>
                            <th>代码 / 名称</th>
                            <th>盘中估算<span id="thEstSrc"></span></th>
                            <th>官方数据<span id="thOffSrc"></span></th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="fundTbody">
                        <tr>
                            <td
                                colspan="4"
                                style="
                                    background: transparent;
                                    border: none;
                                    padding: 0;
                                "
                            >
                                <div class="empty-state loading-pulse">
                                    <div class="empty-icon">⏳</div>
                                    <div
                                        style="
                                            font-size: 15px;
                                            font-weight: 600;
                                            color: var(--t2);
                                            margin-bottom: 6px;
                                        "
                                    >
                                        系统初始化中
                                    </div>
                                    <div
                                        style="
                                            font-size: 12px;
                                            color: var(--t3);
                                        "
                                    >
                                        正在连接数据源并进行测算...
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="toolbar">
                <div class="search-wrap">
                    <span class="si">⌕</span>
                    <input
                        id="codeInput"
                        type="tel"
                        class="num"
                        inputmode="numeric"
                        pattern="[0-9]*"
                        placeholder="输入6位基金代码"
                        maxlength="6"
                        style="font-size: 16px"
                    />
                </div>
                <button class="tbtn tbtn-p" onclick="addFund()">添加</button>
            </div>
        </main>

        <div class="pe-modal" id="peModal" style="display: none">
            <div class="pe-modal-mask" onclick="closePeModal()"></div>
            <div class="pe-modal-box">
                <div class="pe-modal-title">定档</div>
                <div class="pe-modal-sub">选择当前 PE 百分位所在档位</div>

                <div style="display: flex; flex-direction: column; gap: 12px">
                    <select
                        class="pe-modal-select"
                        id="peModalBucket"
                        style="height: 42px; width: 100%"
                    >
                        <option value="80,100">80% 以上 (极度泡沫)</option>
                        <option value="75,80">75% - 80% (疯狂期)</option>
                        <option value="70,75">70% - 75% (平稳撤军)</option>
                        <option value="65,70" selected>
                            65% - 70% (高位警戒)
                        </option>
                        <option value="60,65">60% - 65% (常态偏高)</option>
                        <option value="55,60">55% - 60% (印钞带上沿)</option>
                        <option value="50,55">50% - 55% (物理重心)</option>
                        <option value="45,50">45% - 50% (吸筹带)</option>
                        <option value="40,45">40% - 45% (深水激活)</option>
                        <option value="35,40">35% - 40% (活塞预警)</option>
                        <option value="30,35">30% - 35% (破窗I)</option>
                        <option value="0,30">30% 以下 (破窗II)</option>
                    </select>
                </div>

                <div class="pe-modal-btns">
                    <button class="pe-modal-cancel" onclick="closePeModal()">
                        取消
                    </button>
                    <button class="pe-modal-confirm" onclick="confirmPe()">
                        确认
                    </button>
                </div>
            </div>
        </div>

        <div
            class="drawer-mask"
            id="drawerMask"
            onclick="closeAllDrawers()"
        ></div>

        <div class="drawer" id="holdingDrawer">
            <div class="drawer-handle"></div>
            <div class="drawer-header">
                <span class="drawer-title">持仓总览</span>
                <button class="drawer-close" onclick="closeAllDrawers()">
                    ×
                </button>
            </div>

            <div class="drawer-body" id="holdingDrawerBody"></div>

            <div class="drawer-footer">
                <button
                    class="drawer-footer-btn drawer-footer-btn--cancel"
                    onclick="closeAllDrawers()"
                >
                    取消
                </button>
                <button
                    id="btnHoldingAction"
                    class="drawer-footer-btn drawer-footer-btn--primary"
                    onclick="handleHoldingAction()"
                >
                    保存配置
                </button>
            </div>
        </div>

        <script src="js/config.js"></script>
        <script src="js/logger.js"></script>
        <script src="js/store.js"></script>
        <script src="js/data.js"></script>
        <script src="js/engine.js"></script>
        <script src="js/ui.js"></script>
        <script src="js/ui-holding.js"></script>
        <script src="js/ui-pe.js"></script>
        <script src="js/interact.js"></script>
        <script src="js/main.js"></script>
    </body>
</html>
