name: PE夜间数据引擎

# 定时触发已全面迁移至 Cloudflare Worker 内网服务绑定通道（Master-Scheduler ➔ pe-night-trigger）
# 本工作流支持：CF Worker 自动远程唤醒 / 手机 GitHub App 手动触发
on:
  workflow_dispatch:           # 手动触发入口
    inputs:
      slot:
        description: "触发槽位：early=温和重试，late=未取到数据报错"
        required: false
        default: "late"
  repository_dispatch:         # ✨ 对接新版 CF Worker 的内网穿透安全触发
    types: [snapshot, night, sentinel]

permissions:
  contents: write   # 允许提交验证日志副本 automation/validation-log.json

concurrency:
  group: pe-night-engine
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # checkout/setup-python 提前切Node24，规避2026-06-16弃用

jobs:
  update-gist:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python 环境并启用缓存
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          # ✨ 新增修复：显式指向业务脚本，彻底解决无 requirements.txt 导致的缓存匹配报错
          cache-dependency-path: automation/pe_nightly.py

      - name: 安装 Python 依赖库
        run: pip install akshare pandas

      - name: 抓取并写入Gist
        env:
          PE_GIST_ID: ${{ secrets.PE_GIST_ID }}
          PE_GIST_TOKEN: ${{ secrets.PE_GIST_TOKEN }}
          # ✨ 智能槽位映射：手动时用 inputs.slot；Worker 触发时自动将 night 映射为 early，sentinel 映射为 late
          RUN_SLOT: ${{ inputs.slot || (github.event.action == 'sentinel' && 'late') || (github.event.action == 'night' && 'early') || github.event.action }}
        run: python automation/pe_nightly.py

      - name: 提交验证日志副本
        run: |
          git config user.name "pe-engine-bot"
          git config user.email "actions@github.com"
          git add automation/validation-log.json
          git diff --cached --quiet || git commit -m "engine: 验证日志 $(TZ=Asia/Shanghai date '+%m-%d')"
          git pull --rebase origin main
          git push
