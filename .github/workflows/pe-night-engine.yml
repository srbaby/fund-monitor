name: PE夜间数据引擎

# 定时触发已迁移至 Cloudflare Worker（pe-night-trigger，北京20:30/21:30/22:00三槽自愈+Bark告警）
# 源码存档：automation/cf_worker_pe_trigger.js。本工作流只保留手动/API触发入口。
on:
  workflow_dispatch:           # CF Worker dispatch / 手机GitHub App手动触发
    inputs:
      slot:
        description: "触发槽位：early=温和重试（乐咕未更新则等下一槽），late=未取到数据报错。CF Worker自动传入"
        required: false
        default: "late"

permissions:
  contents: write   # 提交验证日志副本 automation/validation-log.json

concurrency:
  group: pe-night-engine
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # checkout/setup-python 提前切Node24，规避2026-06-16弃用

jobs:
  update-gist:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install akshare pandas
      - name: 抓取并写入Gist
        env:
          PE_GIST_ID: ${{ secrets.PE_GIST_ID }}
          PE_GIST_TOKEN: ${{ secrets.PE_GIST_TOKEN }}
          RUN_SLOT: ${{ inputs.slot }}
        run: python automation/pe_nightly.py
      - name: 提交验证日志副本
        run: |
          git config user.name "pe-engine-bot"
          git config user.email "actions@github.com"
          git add automation/validation-log.json
          git diff --cached --quiet || git commit -m "engine: 验证日志 $(TZ=Asia/Shanghai date '+%m-%d')"
          git pull --rebase origin main
          git push
