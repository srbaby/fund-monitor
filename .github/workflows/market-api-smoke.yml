name: Market API smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Pages URL first; custom API URL after its certificate is active"
        required: true
        default: "https://fund-market-api.pages.dev"
      market_session:
        description: "Set to open only during a mainland trading session; the Tencent estimate backup and the HS300 point comparison can be verified then and only then"
        required: false
        type: choice
        options:
          - closed
          - open
        default: closed

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_URL: ${{ inputs.base_url }}
      DIAGNOSTIC_TOKEN: ${{ secrets.MARKET_API_DIAGNOSTIC_TOKEN }}
      FUND_CODES: "003949,160622,110027,011554,007466,022435"
      MARKET_SESSION: ${{ inputs.market_session }}
    steps:
      - name: Check diagnostic secret
        run: test -n "$DIAGNOSTIC_TOKEN"

      - name: Verify complete forced primary and backup groups
        shell: bash
        run: |
          set -euo pipefail
          failures=0
          request() {
            curl --fail --silent --show-error --retry 2 \
              -H "X-Diagnostic-Token: $DIAGNOSTIC_TOKEN" \
              "$1"
          }
          verify() {
            local endpoint="$1"
            local expected="$2"
            local required_codes="$3"
            local output
            echo "Checking $endpoint"
            if ! output="$(request "$BASE_URL$endpoint")"; then
              echo "Request failed: $endpoint"
              failures=1
              return
            fi
            echo "$output" | jq -c '{ok, status, source, sourceLabel, count: (.data | length), diagnostic}'
            if ! echo "$output" | jq -e --arg expected "$expected" --argjson count "$required_codes" '
              .ok == true and .status == $expected and (.data | length == $count) and
              ([.data[] | .code] | unique | length == $count)
            ' >/dev/null; then
              failures=1
            fi
          }
          # Tencent zeroes its fund estimate outside a trading session, so the
          # backup group is legitimately unavailable then. Assert that shape
          # rather than a complete group, and never call the leg verified.
          expect_offsession() {
            local endpoint="$1"
            local output
            echo "Checking $endpoint (off-session)"
            if ! output="$(request "$BASE_URL$endpoint")"; then
              echo "Request failed: $endpoint"
              failures=1
              return
            fi
            echo "$output" | jq -c '{ok, status, source, sourceLabel, count: (.data | length), diagnostic}'
            if ! echo "$output" | jq -e '.ok == false and .status == "unavailable" and (.data | length == 0)' >/dev/null; then
              failures=1
            fi
            echo "::warning::Tencent estimate backup UNVERIFIED. Rerun with market_session=open during a trading session before treating acceptance as complete."
          }
          verify "/v1/indices?force=primary" primary 6
          verify "/v1/indices?force=backup" backup 6
          verify "/v1/funds/estimate?codes=$FUND_CODES&force=primary" primary 6
          if [ "$MARKET_SESSION" = open ]; then
            verify "/v1/funds/estimate?codes=$FUND_CODES&force=backup" backup 6
          else
            expect_offsession "/v1/funds/estimate?codes=$FUND_CODES&force=backup"
          fi
          verify "/v1/funds/official?codes=$FUND_CODES&force=primary" primary 6
          verify "/v1/funds/official?codes=$FUND_CODES&force=backup" backup 6
          test "$failures" = 0

      - name: Compare HS300 primary and backup points during trading
        if: ${{ inputs.market_session == 'open' }}
        shell: bash
        run: |
          set -euo pipefail
          request() {
            curl --fail --silent --show-error --retry 2 \
              -H "X-Diagnostic-Token: $DIAGNOSTIC_TOKEN" \
              "$1"
          }
          primary="$(request "$BASE_URL/v1/indices?force=primary")"
          backup="$(request "$BASE_URL/v1/indices?force=backup")"
          primary_price="$(echo "$primary" | jq -er '.data[] | select(.code == "000300") | .price')"
          backup_price="$(echo "$backup" | jq -er '.data[] | select(.code == "000300") | .price')"
          primary_time="$(echo "$primary" | jq -er '.data[] | select(.code == "000300") | .quoteAt')"
          backup_time="$(echo "$backup" | jq -er '.data[] | select(.code == "000300") | .quoteAt')"
          relative_delta="$(awk -v primary="$primary_price" -v backup="$backup_price" 'BEGIN { printf "%.6f", (primary - backup < 0 ? backup - primary : primary - backup) / backup }')"
          echo "HS300 primary=$primary_price at $primary_time; backup=$backup_price at $backup_time; delta=$relative_delta"
          awk -v delta="$relative_delta" 'BEGIN { exit !(delta <= 0.0005) }'

      - name: Verify force is denied without diagnostic token
        shell: bash
        run: |
          status="$(curl --silent --output /dev/null --write-out '%{http_code}' "$BASE_URL/v1/indices?force=primary")"
          test "$status" = "403"
