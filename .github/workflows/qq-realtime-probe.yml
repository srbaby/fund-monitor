name: 盘中数据源实时性探针(临时)

on:
  schedule:
    - cron: "2 2 * * 1-5"    # UTC 02:02 = 北京 10:02
    - cron: "2 6 * * 1-5"    # UTC 06:02 = 北京 14:02
  workflow_dispatch:          # 盘中任意时刻可手动加测

permissions:
  contents: write

concurrency:
  group: qq-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 采样
        env:
          PROBE_PLAN: ${{ github.event.schedule == '2 2 * * 1-5' && '10:02' || github.event_name == 'schedule' && '14:02' || 'manual' }}
        run: python automation/probe_intraday.py
      - name: 提交日志
        run: |
          git config user.name "pe-probe-bot"
          git config user.email "actions@github.com"
          git add automation/probe-log.md
          git diff --cached --quiet || git commit -m "probe: 盘中采样 $(TZ=Asia/Shanghai date '+%m-%d %H:%M')"
          git pull --rebase origin main
          git push
